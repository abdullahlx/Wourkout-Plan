          <div class="muscle-tag" style="background:${h(mc,0.13)};border:1px solid ${h(mc,0.27)};color:${mc}">${ex.muscle}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="ex-hint">✦ الخيار البديل مفصول بـ / ✦ اضغط الدائرة لتحديد الإتمام</div>
  </div>`;}

function rMacros(){return `
  <div class="macros-section fade-in">
    <div class="macros-title">🥗 الماكروز اليومية</div>
    <div class="calorie-card">
      <div class="calorie-num">2,000</div>
      <div class="calorie-label">سعرة حرارية يومياً</div>
      <div class="calorie-warn">⚠️ عجزك ~1180 سعرة عن TDEE — راقب طاقتك وأداءك</div>
    </div>
    ${[
      {label:"بروتين",val:224,unit:"g",cal:896,color:"#47C8FF",pct:45,note:"2.2g × 102kg"},
      {label:"كربوهيدرات",val:151,unit:"g",cal:604,color:"#E8FF47",pct:30,note:"الطاقة الأساسية للتمارين"},
      {label:"دهون",val:56,unit:"g",cal:500,color:"#FF7847",pct:25,note:"ضروري للهرمونات"},
    ].map(m=>`
      <div class="macro-row" style="border-color:${h(m.color,0.13)}">
        <div class="macro-top">
          <div><div class="macro-name">${m.label}</div><div class="macro-note">${m.note}</div></div>
          <div class="macro-val"><span class="macro-num" style="color:${m.color}">${m.val}</span><span class="macro-unit">${m.unit}</span><div class="macro-cal">${m.cal} cal</div></div>
        </div>
        <div class="macro-bar-bg"><div class="macro-bar-fill" style="width:${m.pct}%;background:${m.color}"></div></div>
        <div class="macro-pct">${m.pct}% من السعرات</div>
      </div>`).join('')}
    <div class="tips-card">
      <div class="tips-title">💡 نصائح</div>
      ${["وزّع البروتين على 4-5 وجبات طول اليوم","الكارب قبل التمرين وبعده","شرب الماء ≥ 3 لترات يومياً","أيام التمرين رفع الكارب +20g","أيام الراحة خفض الكارب -20g"]
        .map(t=>`<div class="tip-item"><span class="tip-dash">—</span>${t}</div>`).join('')}
    </div>
  </div>`;}

function rFood(){
  const tot=calcItems.reduce((a,i)=>({p:a.p+i.p,c:a.c+i.c,f:a.f+i.f,cal:a.cal+i.cal}),{p:0,c:0,f:0,cal:0});
  const tgt=plan.macros;
  return `
  <div class="food-section fade-in">
    <div class="food-title">🍽️ الأكل</div>
    <div class="food-sub">مطاعم صحية بالرياض + حاسبة ماكروز الوجبة</div>
    <div class="food-tabs">
      <button class="food-tab ${foodSubTab==='restaurants'?'active':''}" onclick="switchFoodTab('restaurants')">🗺️ المطاعم</button>
      <button class="food-tab ${foodSubTab==='calc'?'active':''}" onclick="switchFoodTab('calc')">🧮 حاسبة الوجبة</button>
    </div>
    ${foodSubTab==='restaurants'?`
      ${restaurants.map(r=>`
        <div class="restaurant-card">
          <div class="rest-header"><div class="rest-name">${r.name}</div><div class="rest-tag">${r.tag}</div></div>
          <div class="rest-desc">${r.desc}</div>
          <div class="rest-options">${r.options.map(o=>`<span class="rest-option">${o}</span>`).join('')}</div>
        </div>`).join('')}
      <div style="text-align:center;font-size:11px;color:#333;margin-top:8px">ابحث عنهم على Hunger Station أو Jahez</div>
    `:`
      <div class="ai-box">
        <div class="ai-box-title">✨ احسب بالذكاء الاصطناعي</div>
        <div class="ai-row">
          <input class="ai-input" placeholder='مثال: بان كيك مع نوتيلا قطعة واحدة' value="${aiQuery}" oninput="aiQuery=this.value" onkeydown="if(event.key==='Enter')askAI()">
          <button class="ai-btn" onclick="askAI()" ${aiLoading?'disabled':''}>
            ${aiLoading?'⏳':'🔍'}
          </button>
        </div>
        ${aiLoading?'<div class="ai-loading">جاري الحساب...</div>':''}
        ${aiResult&&!aiLoading?`
        <div class="ai-result">
          <div class="ai-result-name">${aiResult.name}</div>
          <div class="ai-result-nums">
            <span class="ai-num-tag" style="background:#47C8FF22;color:#47C8FF">P: ${aiResult.p}g</span>
            <span class="ai-num-tag" style="background:#E8FF4722;color:#E8FF47">C: ${aiResult.c}g</span>
            <span class="ai-num-tag" style="background:#FF784722;color:#FF7847">F: ${aiResult.f}g</span>
            <span class="ai-num-tag" style="background:#ffffff11;color:#888">${aiResult.cal} cal</span>
          </div>
          <button class="ai-add-btn" onclick="addAIResult()">+ أضف للوجبة</button>
        </div>`:''}
      </div>
      <div class="calc-box">
        <div class="calc-label">📝 أضف مكونات الوجبة</div>
        <div class="mode-toggle">
          <button class="mode-btn ${calcMode==='macros'?'active':''}" onclick="calcMode='macros';render()">🔢 ماكروز مفصل</button>
          <button class="mode-btn ${calcMode==='calories'?'active':''}" onclick="calcMode='calories';render()">🔥 سعرات فقط</button>
        </div>
        <div class="calc-row">
          <input class="calc-input" placeholder="اسم الأكل" value="${calcName}" oninput="calcName=this.value">
        </div>
        ${calcMode==='macros'?`
        <div class="calc-row">
          <input class="calc-input" placeholder="بروتين g" type="number" value="${calcP}" oninput="calcP=this.value" style="text-align:center">
          <input class="calc-input" placeholder="كارب g" type="number" value="${calcC}" oninput="calcC=this.value" style="text-align:center">
          <input class="calc-input" placeholder="دهون g" type="number" value="${calcF}" oninput="calcF=this.value" style="text-align:center">
          <button class="calc-add-btn" onclick="addItem()">+</button>
        </div>`:`
        <div class="calc-row">
          <input class="calc-input" placeholder="السعرات" type="number" value="${calcCal}" oninput="calcCal=this.value" style="text-align:center">
          <button class="calc-add-btn" onclick="addItem()">+</button>
        </div>`}
        <div class="quick-label">أمثلة جاهزة (اضغط للإضافة):</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
          ${foodDb.map((f,i)=>`<button class="quick-btn" onclick="quickAdd(${i})">${f.name}</button>`).join('')}
        </div>
        <div class="calc-items-list">
          ${calcItems.length===0?`<div class="calc-empty">لا يوجد مكونات — أضف من الأعلى</div>`:
            calcItems.map((item,i)=>`
              <div class="calc-item">
                <div class="calc-item-left">
                  <div class="calc-item-name">${item.name}</div>
                  <div class="calc-item-nums">P:${item.p}g  C:${item.c}g  F:${item.f}g  — ${Math.round(item.cal)} cal</div>
                </div>
                <span class="calc-item-del" onclick="removeItem(${i})">×</span>
              </div>`).join('')}
        </div>
        ${calcItems.length>0?`
        <div class="calc-total">
          <div class="calc-total-title">▸ مجموع الوجبة</div>
          ${[
            {label:"سعرات",val:Math.round(tot.cal),color:"#E8FF47",unit:"",max:tgt.calories},
            {label:"بروتين",val:Math.round(tot.p),color:"#47C8FF",unit:"g",max:tgt.protein},
            {label:"كارب",val:Math.round(tot.c),color:"#E8FF47",unit:"g",max:tgt.carbs},
            {label:"دهون",val:Math.round(tot.f),color:"#FF7847",unit:"g",max:tgt.fat},
          ].map(s=>{
            const pct2=Math.min(110,Math.round(s.val/s.max*100));
            const over=s.val>s.max;
            return `
            <div class="calc-stat-row">
              <span class="calc-stat-label">${s.label}</span>
              <span class="calc-stat-val" style="color:${over?'#FF4747':s.color}">${s.val}${s.unit}</span>
            </div>
            <div class="calc-bar-label"><span style="color:${over?'#FF474788':'#444'}">${pct2}% من الهدف اليومي</span><span style="color:#444">${s.max}${s.unit}</span></div>
            <div class="calc-bar-bg"><div class="calc-bar-fill" style="width:${pct2}%;background:${over?'#FF4747':s.color}"></div></div>`;
          }).join('')}
        </div>`:''}
      </div>
    `}
  </div>`;}

function switchDay(i){activeDay=i;render();}
function switchTab(t){activeTab=t;render();}
function toggleCheck(k){checked[k]=!checked[k];saveState();render();}
function switchFoodTab(t){foodSubTab=t;render();}
function addItem(){
  const n=calcName.trim();
  if(!n)return;
  let p=0,c=0,f=0,cal=0;
  if(calcMode==='macros'){
    p=parseFloat(calcP)||0; c=parseFloat(calcC)||0; f=parseFloat(calcF)||0;
    cal=p*4+c*4+f*9;
  } else {
    cal=parseFloat(calcCal)||0;
  }
  calcItems.push({name:n,p,c,f,cal});
  calcName="";calcP="";calcC="";calcF="";calcCal="";
  saveState();render();
}
function removeItem(i){calcItems.splice(i,1);saveState();render();}
function quickAdd(i){const f=foodDb[i];calcItems.push({name:f.name,p:f.p,c:f.c,f:f.f,cal:f.cal});saveState();render();}

async function askAI(){
  const q=aiQuery.trim();
  if(!q||aiLoading)return;
  aiLoading=true; aiResult=null; render();
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:200,
        system:"أنت خبير تغذية. المستخدم يذكر وجبة أو أكلة. أعطه تقدير الماكروز لها. رد بـ JSON فقط بدون أي نص آخر: {name, p, c, f, cal} حيث p=بروتين, c=كارب, f=دهون بالجرام, cal=السعرات. كن دقيقاً في التقدير.",
        messages:[{role:"user",content:q}]
      })
    });
    const data=await res.json();
    const text=data.content[0].text.replace(/```json|```/g,"").trim();
    // Try to extract JSON even if wrapped in text
    const jsonMatch=text.match(/\{[\s\S]*\}/);
    const parsed=JSON.parse(jsonMatch?jsonMatch[0]:text);
    const protein=parsed.protein||parsed.p||parsed.بروتين||0;
    const carbs=parsed.carbs||parsed.carbohydrates||parsed.c||parsed.كارب||parsed.كربوهيدرات||0;
    const fat=parsed.fat||parsed.f||parsed.دهون||0;
    const calories=parsed.calories||parsed.cal||parsed.سعرات||(protein*4+carbs*4+fat*9)||0;
    const name=parsed.name||parsed.اسم||q;
    aiResult={name, p:Math.round(protein), c:Math.round(carbs), f:Math.round(fat), cal:Math.round(calories)};
  }catch(e){console.error(e);aiResult={error:true};}
  aiLoading=false; render();
}

function addAIResult(){
  if(!aiResult||aiResult.error)return;
  calcItems.push({name:aiResult.name, p:aiResult.p, c:aiResult.c, f:aiResult.f, cal:aiResult.cal});
  aiResult=null; aiQuery="";
  saveState(); render();
}

loadState();
render();
</script>
